<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DaoDao · 音频转换矩阵</title>
    <!-- 动态粒子背景库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.dots.min.js"></script>
    <!-- FFmpeg 稳定版 0.11.6 (无需跨域隔离) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <!-- 自定义样式和脚本 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="vanta-bg"></div>
<div class="main-container">
    <div class="card">
        <div class="brand">
            <div class="logo-area">DAODAO</div>
            <div class="app-sub">Audio Matrix Converter</div>
        </div>
        <div id="dropZone" class="drop-zone">
            <div class="upload-text">将音频资产拖至此处或点击浏览</div>
            <div class="upload-hint">支持 NCM · KGM · OGG 本地重组</div>
            <input type="file" id="fileInput" multiple accept=".ogg,.kgm,.ncm" class="hidden-input" />
        </div>
        <div id="fileListContainer" class="files-list" style="display: none;"></div>
        <button id="convertBtn" class="convert-btn" disabled>开始解析转换</button>
        <div id="progressWrapper" class="progress-area" style="display: none;">
            <div class="progress-bar-bg"><div id="progressFill" class="progress-fill"></div></div>
        </div>
        <div id="resultArea" class="result-area" style="display: none;"></div>
        <div id="bottomStatus" class="footer-status">
            <span id="statusText">内核就绪 · 稳定解析核心</span>
        </div>
    </div>
</div>
<script src="main.js"></script>
</body>
</html>
