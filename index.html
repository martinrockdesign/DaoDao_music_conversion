<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaoDao ncm 转 mp3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.dots.min.js"></script>
    <style>
        :root {
            --bg-color: #060913;
            --accent-color: #00f2fe;
            --text-main: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* 动态背景容器 */
        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 主舞台居中 */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* 核心发光圆形按钮 */
        .core-button {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.35), inset 0 0 20px rgba(0, 242, 254, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            gap: 8px;
            outline: none;
        }

        .core-button:hover {
            transform: scale(1.08);
            border-color: rgba(0, 242, 254, 0.8);
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.6), inset 0 0 30px rgba(0, 242, 254, 0.3);
        }
        
        .core-button:active {
            transform: scale(0.95);
        }

        .btn-text-large {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 242, 254, 0.2);
        }

        .btn-text-small {
            font-size: 0.95rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* --- 弹窗/模态框遮罩 --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 弹窗容器 */
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        /* 弹窗控制栏 */
        .modal-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #ef4444;
        }

        /* ✂️ 核心新增：遮罩裁剪外壳 ✂️ */
        .iframe-clipper {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden; /* 核心：强行裁剪掉容器外的多余网页内容 */
            background: #ffffff; /* 防止下方原网页穿透变色 */
        }

        /* 📡 核心修正：内嵌网页定位拉伸 📡 */
        .embedded-frame {
            position: absolute;
            width: 100%;
            border: none;
            
            /* -----------------------------------------------------------------
               💡 极客调教指南：
               1. top: -95px; 代表把外部网页往上提 95 像素（以此遮住它的顶部导航栏）。
               2. height: calc(100% + 140px); 把高撑大，配合底部溢出裁剪，遮住底部。
               如果发现遮挡不准，微调这两个数字即可！
               ----------------------------------------------------------------- */
            top: -60px; 
            height: calc(100% + 400px); 
        }
    </style>
</head>
<body>

<div id="vanta-bg"></div>

<div class="main-container">
    <button id="openMatrixBtn" class="core-button">
        <span class="btn-text-large">Convert</span>
        <span class="btn-text-small">.ncm to .mp3</span>
    </button>
</div>

<div id="matrixModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <button id="closeModalBtn" class="close-btn" title="关闭窗口">&times;</button>
        </div>
        <div class="iframe-clipper">
            <iframe src="https://www.ncm2mp3.com/" class="embedded-frame" title="DaoDao 转换终端"></iframe>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 1. 科技黑底色 + 动态随机粒子变色 ----------
        let vantaEffect = null;
        const techColors = [
            { c1: 0x00f2fe, c2: 0x4facfe }, 
            { c1: 0x7f00ff, c2: 0xff007f }, 
            { c1: 0x00ff87, c2: 0x60efff }, 
            { c1: 0xf43f5e, c2: 0xfca5a5 }
        ];

        function initVanta() {
            if (vantaEffect) vantaEffect.destroy();
            try {
                vantaEffect = VANTA.DOTS({
                    el: "#vanta-bg",
                    mouseControls: true,
                    touchControls: true,
                    minHeight: 200.00,
                    minWidth: 200.00,
                    scale: 1.00,
                    scaleMobile: 1.00,
                    color: techColors[0].c1,
                    color2: techColors[0].c2,
                    backgroundColor: 0x060913, // 固定深蓝黑底色
                    size: 2.80, 
                    spacing: 32.00
                });
                
                setInterval(() => {
                    if (vantaEffect && vantaEffect.setOptions) {
                        const randomPair = techColors[Math.floor(Math.random() * techColors.length)];
                        vantaEffect.setOptions({
                            color: randomPair.c1,
                            color2: randomPair.c2
                        });
                    }
                }, 4000);
            } catch(e) {
                document.getElementById('vanta-bg').style.background = "#060913";
            }
        }
        
        window.addEventListener('load', () => {
            initVanta();
            window.addEventListener('resize', () => { if(vantaEffect) vantaEffect.resize(); });
        });

        // ---------- 2. 弹窗交互控制 ----------
        const openBtn = document.getElementById('openMatrixBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modal = document.getElementById('matrixModal');

        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    })();
</script>
</body>
</html>
