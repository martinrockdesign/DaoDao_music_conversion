<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaoDao 极简音频矩阵</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.dots.min.js"></script>
    <style>
        :root {
            --bg-color: #060913;
            --accent-color: #00f2fe;
            --text-main: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* --- 核心圆形按钮 --- */
        .core-button {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.35), inset 0 0 20px rgba(0, 242, 254, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            gap: 8px;
            outline: none;
        }

        .core-button:hover {
            transform: scale(1.08);
            border-color: rgba(0, 242, 254, 0.8);
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.6), inset 0 0 30px rgba(0, 242, 254, 0.3);
        }
        
        .core-button:active {
            transform: scale(0.95);
        }

        .btn-text-large {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 242, 254, 0.2);
        }

        .btn-text-small {
            font-size: 0.95rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 1px;
        }

        /* --- 网关弹窗系统 --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .gateway-content {
            position: relative;
            width: 90%;
            max-width: 480px;
            background: rgba(15, 23, 42, 0.85);
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 242, 254, 0.2), inset 0 0 20px rgba(0, 242, 254, 0.1);
            overflow: hidden;
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .modal-overlay.active .gateway-content {
            transform: translateY(0) scale(1);
        }

        /* 终端加载动画UI */
        .terminal-header {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00f2fe;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .terminal-status {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            min-height: 20px;
            font-family: monospace;
        }

        /* 赛博朋克进度条 */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 2rem;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 10px #00f2fe;
            transition: width 0.1s linear;
        }

        /* 取消按钮 */
        .cancel-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #ef4444;
        }
    </style>
</head>
<body>

<div id="vanta-bg"></div>

<div class="main-container">
    <button id="openMatrixBtn" class="core-button">
        <span class="btn-text-large">Convert</span>
        <span class="btn-text-small">.ncm to .mp3</span>
    </button>
</div>

<div id="matrixModal" class="modal-overlay">
    <div class="gateway-content">
        <div class="terminal-header">Establishing Link</div>
        <div id="terminalStatus" class="terminal-status">初始化矩阵跃迁协议...</div>
        <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <button id="cancelBtn" class="cancel-btn">中止链路 (ABORT)</button>
    </div>
</div>

<script>
    (function(){
        // ---------- 1. 科技黑底色 + 动态粒子 ----------
        let vantaEffect = null;
        const techColors = [
            { c1: 0x00f2fe, c2: 0x4facfe }, 
            { c1: 0x7f00ff, c2: 0xff007f }, 
            { c1: 0x00ff87, c2: 0x60efff }, 
            { c1: 0xf43f5e, c2: 0xfca5a5 }
        ];

        function initVanta() {
            if (vantaEffect) vantaEffect.destroy();
            try {
                vantaEffect = VANTA.DOTS({
                    el: "#vanta-bg",
                    mouseControls: true,
                    touchControls: true,
                    minHeight: 200.00,
                    minWidth: 200.00,
                    scale: 1.00,
                    scaleMobile: 1.00,
                    color: techColors[0].c1,
                    color2: techColors[0].c2,
                    backgroundColor: 0x060913,
                    size: 2.80, 
                    spacing: 32.00
                });
                
                setInterval(() => {
                    if (vantaEffect && vantaEffect.setOptions) {
                        const randomPair = techColors[Math.floor(Math.random() * techColors.length)];
                        vantaEffect.setOptions({ color: randomPair.c1, color2: randomPair.c2 });
                    }
                }, 4000);
            } catch(e) {
                document.getElementById('vanta-bg').style.background = "#060913";
            }
        }
        
        window.addEventListener('load', () => {
            initVanta();
            window.addEventListener('resize', () => { if(vantaEffect) vantaEffect.resize(); });
        });

        // ---------- 2. 网关跃迁交互逻辑 ----------
        const openBtn = document.getElementById('openMatrixBtn');
        const modal = document.getElementById('matrixModal');
        const cancelBtn = document.getElementById('cancelBtn');
        const statusText = document.getElementById('terminalStatus');
        const progressBar = document.getElementById('progressBar');

        let jumpTimer = null;
        let progressInterval = null;

        // 模拟黑客帝国式的连接状态文字
        const statusMessages = [
            "正在解算前端防御策略...",
            "绕过本地安全沙盒...",
            "连接到 NCM 音频转换子核心...",
            "握手成功，准备注入环境..."
        ];

        function startJumpSequence() {
            let progress = 0;
            let msgIndex = 0;
            
            progressBar.style.width = '0%';
            statusText.innerText = statusMessages[0];
            modal.classList.add('active');

            // 文字轮播动画
            const textInterval = setInterval(() => {
                msgIndex++;
                if(msgIndex < statusMessages.length) {
                    statusText.innerText = statusMessages[msgIndex];
                }
            }, 500); // 每0.5秒换一次字

            // 进度条动画 (总计 1.8 秒左右)
            progressInterval = setInterval(() => {
                progress += Math.random() * 5 + 2; 
                if (progress >= 100) progress = 100;
                progressBar.style.width = `${progress}%`;
            }, 100);

            // 跃迁执行！在当前窗口无缝覆盖跳转
            jumpTimer = setTimeout(() => {
                clearInterval(textInterval);
                clearInterval(progressInterval);
                statusText.innerText = "进入转换终端...";
                // 重点：使用 window.location.href 替换原网页，而不是弹新标签页
                window.location.href = 'https://www.ncm2mp3.com/';
            }, 1800);
        }

        function abortJump() {
            clearTimeout(jumpTimer);
            clearInterval(progressInterval);
            modal.classList.remove('active');
            setTimeout(() => {
                progressBar.style.width = '0%';
                statusText.innerText = '链路已中止';
            }, 400);
        }

        // 绑定事件
        openBtn.addEventListener('click', startJumpSequence);
        cancelBtn.addEventListener('click', abortJump);

    })();
</script>
</body>
</html>
